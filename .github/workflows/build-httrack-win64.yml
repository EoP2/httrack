name: Build HTTrack Win64 Portable

on:
  workflow_dispatch:
  push:
    tags:
      - 'build-*'

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            autoconf
            autoconf-archive
            automake
            libtool
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-ntldd-git

      - name: Clone and build HTTrack
        run: |
          git clone https://github.com/xroche/httrack.git --recurse
          cd httrack
          autoreconf -fi
          CFLAGS="-Dtimegm=mktime -w" \
            ./configure --prefix=$HOME/usr \
            && make -j8 \
            && make install

      - name: Package portable zip
        run: |
          set -e
          OUTDIR="httrack-win64-portable"
          MINGW_BIN="/mingw64/bin"
          INST="$HOME/usr"
          mkdir -p "$OUTDIR"

          # 复制编译产出
          cp -v "$INST/bin/"*.exe "$OUTDIR/" 2>/dev/null || true
          cp -v "$INST/bin/"*.dll "$OUTDIR/" 2>/dev/null || true
          cp -v "$INST/lib/httrack/"*.dll "$OUTDIR/" 2>/dev/null || true

          echo "=== 编译产出 ==="
          ls -lh "$OUTDIR"

          # 用 ntldd 收集所有 MINGW64 运行时 DLL
          for f in "$OUTDIR"/*.exe "$OUTDIR"/*.dll; do
            [ -f "$f" ] || continue
            ntldd -R "$f" 2>/dev/null \
              | grep -i 'mingw64' \
              | awk '{print $3}' \
              | while read dll; do
                  [ -f "$dll" ] && cp -nv "$dll" "$OUTDIR/"
                done
          done

          # 兜底补充核心 DLL
          for dll in \
            libssl-3-x64.dll libcrypto-3-x64.dll \
            libgcc_s_seh-1.dll libwinpthread-1.dll \
            libz-1.dll libstdc++-6.dll; do
            [ -f "$MINGW_BIN/$dll" ] && cp -nv "$MINGW_BIN/$dll" "$OUTDIR/" || true
          done

          echo "=== 最终文件列表 ==="
          ls -lh "$OUTDIR"

      - name: Smoke test
        shell: cmd
        run: httrack-win64-portable\httrack.exe --version

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path httrack-win64-portable\* -DestinationPath httrack-win64-portable.zip
          Write-Host "Size: $([math]::Round((Get-Item httrack-win64-portable.zip).Length/1MB,2)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: httrack-win64-portable
          path: httrack-win64-portable.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: httrack-win64-portable.zip
          body: |
            HTTrack Win64 Portable, built with MSYS2 MINGW64 + latest OpenSSL.
            Unzip and run httrack.exe directly, no installation needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
